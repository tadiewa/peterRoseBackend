services:
  db:
    image: postgres:16-alpine
    container_name: peterrose-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: peterose
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: peterrose-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/peterose
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      YOCO_SECRET_KEY: ${YOCO_SECRET_KEY}
    ports:
      - "9039:9039"
    volumes:
      - uploads_data:/root/peterrose-uploads

volumes:
  postgres_data:
  uploads_data: